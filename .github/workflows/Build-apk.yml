name: Build Dev APK

on:
  push:
    branches:
      - '**'

permissions:
  contents: write

jobs:
  Gradle:
    if: endsWith(github.event.head_commit.message, 'workflow build') && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    # Install Gradle (needed to generate wrapper)
    - name: Install Gradle
      run: sudo apt-get update && sudo apt-get install -y gradle

    # Generate wrapper only if missing
    - name: Ensure Gradle wrapper exists
      run: |
        if [ ! -f "gradlew" ]; then
          echo "Gradle wrapper missing, generating..."
          gradle wrapper
        else
          echo "Gradle wrapper already exists"
        fi

    - name: Make Gradle executable
      run: chmod +x ./gradlew

    - name: Setup JDK
      uses: actions/setup-java@v4
      with:
        java-version: 11
        distribution: 'temurin'

    - name: Build Release APK
      run: ./gradlew assembleRelease

    - name: Prepare beta builds folder
      run: |
        rm -rf beta-builds
        mkdir -p beta-builds

    - name: Copy APK
      run: cp app/build/outputs/apk/release/app-release.apk beta-builds/app-release.apk

    - name: Commit APK
      run: |
        git config user.name "github-actions"
        git config user.email "github-actions@github.com"
        git add beta-builds/app-release.apk
        git commit -m "create beta build APK" || echo "No changes to commit"
        git push
